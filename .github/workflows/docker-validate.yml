name: Docker Build Validation

on:
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
    paths:
      - .github/workflows/docker-validate.yml
      - .github/workflows/docker-publish.yml
      - Dockerfile
      - src/**
      - pyproject.toml

concurrency:
  group: docker-validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version and build info
        id: get_version
        shell: bash
        run: |
          set -euo pipefail

          VERSION=$(python3 -c "import importlib.util; spec = importlib.util.spec_from_file_location('biblebot', 'src/biblebot/__init__.py'); mod = importlib.util.module_from_spec(spec); spec.loader.exec_module(mod); print(mod.__version__)")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Extracted version: $VERSION"

          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          echo "BUILD_DATE=$BUILD_DATE" >> "$GITHUB_ENV"

          GIT_SHA=$(git rev-parse --short HEAD)
          echo "GIT_SHA=$GIT_SHA" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            network=host

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: matrix-biblebot:validate
          build-args: |
            BUILD_DATE=${{ env.BUILD_DATE }}
            VCS_REF=${{ env.GIT_SHA }}
            VERSION=${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — verify image runs
        run: docker run --rm matrix-biblebot:validate biblebot --version
